# CI Stage 1（Phase X-05-1・doc63 §4 Stage 1 準拠）
# DB不要・secrets不要・本番接触なし。既存の package scripts のみを実行する。
# Stage 3（E2E smoke）は stage3_e2e ジョブとして追加（doc129/roadmap30 設計）。
# stage3_e2e は ephemeral Postgres service（本番DB非接続・使い捨て）で
# migrate deploy → seed（DEMO）→ build → playwright を実行する。
# 外部送信なし（EXTERNAL_SEND_ENABLED=false / LogEmailProvider）・実LLMなし（LLM_PROVIDER=fake）・
# AIコストなし・runtime解禁なし・secrets不要・本番非接触。
name: CI

on:
  push:
    branches:
      - main
      - claude/**
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  stage1:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Company Brain safety checks
        run: node scripts/check-company-brain-safety.mjs

      - name: Unit tests
        run: pnpm test

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

  # Stage 2: 統合テスト（実 PostgreSQL + 実 Redis）。EMERGENCY Gate-0（V82）。
  # 従来 `*.itest.ts` は root vitest から除外され CI 未実行だった（Codex #4964735182 P2）。
  # ここで ephemeral な PostgreSQL/Redis service を立て、実 DB/実 queue 統合テストを実際に走らせる。
  # 本番 DB/queue 非接続・secrets 不要・外部送信なし・実 LLM なし。stage1 成功後にのみ実行する。
  stage2_integration:
    runs-on: ubuntu-latest
    needs: stage1
    timeout-minutes: 25
    env:
      DATABASE_URL: postgresql://app:app@localhost:5432/ikezaki_os
      DIRECT_URL: postgresql://app:app@localhost:5432/ikezaki_os
      # worker 実 queue テストは loopback のみ許可（test 側で host を機械確認）。service redis を 6379 で待受。
      REDIS_TEST_URL: redis://127.0.0.1:6379
      LLM_PROVIDER: fake
      MAIL_PROVIDER: log
      EXTERNAL_SEND_ENABLED: 'false'
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: ikezaki_os
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d ikezaki_os"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # db スクリプトは dotenv -e ../../.env を読むため CI 専用 .env を生成する（すべて非機密・ephemeral）。
      - name: Write CI .env (ephemeral, non-secret)
        run: |
          cat > .env <<'ENVEOF'
          DATABASE_URL=postgresql://app:app@localhost:5432/ikezaki_os
          DIRECT_URL=postgresql://app:app@localhost:5432/ikezaki_os
          LLM_PROVIDER=fake
          MAIL_PROVIDER=log
          EXTERNAL_SEND_ENABLED=false
          ENVEOF

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Apply migrations (ephemeral DB)
        run: pnpm db:migrate:deploy

      - name: Seed demo data
        run: pnpm db:seed

      # Codex #4964735182 P2: integration job が実際に収集する itest 件数をログへ出す（silent 0 実行の防止）。
      - name: Report integration test file counts
        run: |
          echo "db integration (*.itest.ts):"
          ls packages/db/src/__tests__/*.itest.ts | wc -l
          ls packages/db/src/__tests__/*.itest.ts
          echo "worker integration (*.itest.ts):"
          ls apps/worker/src/__tests__/*.itest.ts | wc -l
          ls apps/worker/src/__tests__/*.itest.ts

      - name: DB integration tests (ephemeral Postgres)
        run: pnpm --filter @hokko/db test:integration

      - name: Worker real-queue integration tests (ephemeral Redis)
        run: pnpm --filter @hokko/worker test:integration

  # Stage 3: E2E smoke（playwright）。稼働中 Web（pnpm start）＋ seed 済み ephemeral DB を前提とする。
  # 本番DB非接続・secrets不要・外部送信なし・実LLMなし。stage1 成功後にのみ実行する。
  stage3_e2e:
    runs-on: ubuntu-latest
    needs: stage1
    timeout-minutes: 30
    # 安全側の env。実送信は無効（既定）・LLM は fake・DB は service コンテナ（ローカル）。
    env:
      DATABASE_URL: postgresql://app:app@localhost:5432/ikezaki_os
      DIRECT_URL: postgresql://app:app@localhost:5432/ikezaki_os
      SESSION_SECRET: ci-e2e-insecure-session-secret-0123456789abcdef
      APP_URL: http://localhost:3000
      E2E_BASE_URL: http://localhost:3000
      LLM_PROVIDER: fake
      MAIL_PROVIDER: log
      EXTERNAL_SEND_ENABLED: 'false'
    services:
      postgres:
        # docker-compose と同じ pgvector 入り pg16。使い捨て（本番非接続）。
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: ikezaki_os
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d ikezaki_os"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # db スクリプトは dotenv -e ../../.env を読むため、CI 専用の .env を生成する。
      # 値はすべて非機密（ephemeral DB / fake LLM / 送信無効）。.env は gitignore 済みでコミットされない。
      - name: Write CI .env (ephemeral, non-secret)
        run: |
          cat > .env <<'ENVEOF'
          DATABASE_URL=postgresql://app:app@localhost:5432/ikezaki_os
          DIRECT_URL=postgresql://app:app@localhost:5432/ikezaki_os
          SESSION_SECRET=ci-e2e-insecure-session-secret-0123456789abcdef
          APP_URL=http://localhost:3000
          LLM_PROVIDER=fake
          MAIL_PROVIDER=log
          EXTERNAL_SEND_ENABLED=false
          ENVEOF

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Apply migrations (ephemeral DB)
        run: pnpm db:migrate:deploy

      - name: Seed demo data
        run: pnpm db:seed

      - name: Build web
        run: pnpm build

      - name: Install Playwright browser (chromium)
        run: pnpm --filter @hokko/web exec playwright install --with-deps chromium

      - name: Run E2E (playwright)
        run: pnpm --filter @hokko/web exec playwright test

      # F2 診断（doc137/roadmap38）: 失敗時の html report + trace zip + screenshot を artifact 化。
      # test-results/ に trace/screenshot、playwright-report/ に html が出力される（config で設定）。
      - name: Upload Playwright report and traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            apps/web/playwright-report
            apps/web/test-results
          retention-days: 7
          if-no-files-found: ignore

      # 証拠スクリーンショット（roadmap74 §9）: e2e が撮る 3D オフィス desktop/mobile の PNG を
      # 成否に関わらず artifact 化する（失敗時は失敗診断画像も同梱される）。
      # 対象は seed の DEMO データのみ（実顧客 PII なし）。名前は run ID 付き・短 retention。
      - name: Upload E2E evidence screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots-${{ github.run_id }}
          path: apps/web/test-results/**/*.png
          retention-days: 3
          if-no-files-found: ignore
