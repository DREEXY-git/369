# CI Stage 1（Phase X-05-1・doc63 §4 Stage 1 準拠）
# DB不要・secrets不要・本番接触なし。既存の package scripts のみを実行する。
# Stage 3（E2E smoke）は stage3_e2e ジョブとして追加（doc129/roadmap30 設計）。
# stage3_e2e は ephemeral Postgres service（本番DB非接続・使い捨て）で
# migrate deploy → seed（DEMO）→ build → playwright を実行する。
# 外部送信なし（EXTERNAL_SEND_ENABLED=false / LogEmailProvider）・実LLMなし（LLM_PROVIDER=fake）・
# AIコストなし・runtime解禁なし・secrets不要・本番非接触。
name: CI

# EMERGENCY Gate-0 R2（V83 6.4）: 同一 SHA の push run と pull_request run の二重実行を解消する。
# branch（claude/**）の CI は pull_request イベントを唯一の正本にする（push は main のみ＝post-merge 正本）。
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  stage1:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Company Brain safety checks
        run: node scripts/check-company-brain-safety.mjs

      - name: Unit tests
        run: pnpm test

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      # EMERGENCY Gate-0 R2（V83 6.4）: critical な integration/E2E に条件付き skip/only/fixme が無いことを source scan。
      # 1件でもあれば失敗（silent skip による証拠消失を防ぐ）。"test-only wrapper" 等の hyphen 文字列は非該当。
      - name: No critical skip/only/fixme in integration/E2E
        run: |
          if grep -rnE '(test|it|describe)\.(skip|only|fixme)\(' \
              apps/web/tests/e2e packages/db/src/__tests__ apps/worker/src/__tests__; then
            echo "::error::critical skip/only/fixme found in integration/E2E tests"; exit 1
          fi
          echo "OK: no critical skip/only/fixme"

  # Stage 2: 統合テスト（実 PostgreSQL + 実 Redis）。EMERGENCY Gate-0（V82）。
  # 従来 `*.itest.ts` は root vitest から除外され CI 未実行だった（Codex #4964735182 P2）。
  # ここで ephemeral な PostgreSQL/Redis service を立て、実 DB/実 queue 統合テストを実際に走らせる。
  # 本番 DB/queue 非接続・secrets 不要・外部送信なし・実 LLM なし。stage1 成功後にのみ実行する。
  stage2_integration:
    runs-on: ubuntu-latest
    needs: stage1
    timeout-minutes: 25
    env:
      DATABASE_URL: postgresql://app:app@localhost:5432/ikezaki_os
      DIRECT_URL: postgresql://app:app@localhost:5432/ikezaki_os
      # worker 実 queue テストは loopback のみ許可（test 側で host を機械確認）。service redis を 6379 で待受。
      REDIS_TEST_URL: redis://127.0.0.1:6379
      LLM_PROVIDER: fake
      MAIL_PROVIDER: log
      EXTERNAL_SEND_ENABLED: 'false'
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: ikezaki_os
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d ikezaki_os"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # db スクリプトは dotenv -e ../../.env を読むため CI 専用 .env を生成する（すべて非機密・ephemeral）。
      - name: Write CI .env (ephemeral, non-secret)
        run: |
          cat > .env <<'ENVEOF'
          DATABASE_URL=postgresql://app:app@localhost:5432/ikezaki_os
          DIRECT_URL=postgresql://app:app@localhost:5432/ikezaki_os
          LLM_PROVIDER=fake
          MAIL_PROVIDER=log
          EXTERNAL_SEND_ENABLED=false
          ENVEOF

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Apply migrations (ephemeral DB)
        run: pnpm db:migrate:deploy

      - name: Seed demo data
        run: pnpm db:seed

      # Codex #4964735182 P2: integration job が実際に収集する itest 件数をログへ出し、0 件収集は失敗にする。
      - name: Report integration test file counts (fail on 0)
        run: |
          dbc=$(ls packages/db/src/__tests__/*.itest.ts 2>/dev/null | wc -l)
          wkc=$(ls apps/worker/src/__tests__/*.itest.ts 2>/dev/null | wc -l)
          echo "db integration (*.itest.ts): $dbc"
          ls packages/db/src/__tests__/*.itest.ts
          echo "worker integration (*.itest.ts): $wkc"
          ls apps/worker/src/__tests__/*.itest.ts
          test "$dbc" -gt 0 || { echo "::error::0 db itest collected"; exit 1; }
          test "$wkc" -gt 0 || { echo "::error::0 worker itest collected"; exit 1; }

      - name: DB integration tests (ephemeral Postgres)
        run: pnpm --filter @hokko/db test:integration

      - name: Worker real-queue integration tests (ephemeral Redis)
        run: pnpm --filter @hokko/worker test:integration

  # Stage 3: E2E smoke（playwright）。稼働中 Web（pnpm start）＋ seed 済み ephemeral DB を前提とする。
  # 本番DB非接続・secrets不要・外部送信なし・実LLMなし。stage1 成功後にのみ実行する。
  stage3_e2e:
    runs-on: ubuntu-latest
    needs: stage1
    timeout-minutes: 30
    # 安全側の env。実送信は無効（既定）・LLM は fake・DB は service コンテナ（ローカル）。
    env:
      DATABASE_URL: postgresql://app:app@localhost:5432/ikezaki_os
      DIRECT_URL: postgresql://app:app@localhost:5432/ikezaki_os
      SESSION_SECRET: ci-e2e-insecure-session-secret-0123456789abcdef
      APP_URL: http://localhost:3000
      E2E_BASE_URL: http://localhost:3000
      LLM_PROVIDER: fake
      MAIL_PROVIDER: log
      EXTERNAL_SEND_ENABLED: 'false'
    services:
      postgres:
        # docker-compose と同じ pgvector 入り pg16。使い捨て（本番非接続）。
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: ikezaki_os
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d ikezaki_os"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # db スクリプトは dotenv -e ../../.env を読むため、CI 専用の .env を生成する。
      # 値はすべて非機密（ephemeral DB / fake LLM / 送信無効）。.env は gitignore 済みでコミットされない。
      - name: Write CI .env (ephemeral, non-secret)
        run: |
          cat > .env <<'ENVEOF'
          DATABASE_URL=postgresql://app:app@localhost:5432/ikezaki_os
          DIRECT_URL=postgresql://app:app@localhost:5432/ikezaki_os
          SESSION_SECRET=ci-e2e-insecure-session-secret-0123456789abcdef
          APP_URL=http://localhost:3000
          LLM_PROVIDER=fake
          MAIL_PROVIDER=log
          EXTERNAL_SEND_ENABLED=false
          ENVEOF

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Apply migrations (ephemeral DB)
        run: pnpm db:migrate:deploy

      - name: Seed demo data
        run: pnpm db:seed

      - name: Build web
        run: pnpm build

      - name: Install Playwright browser (chromium)
        run: pnpm --filter @hokko/web exec playwright install --with-deps chromium

      # EMERGENCY Gate-0 R4（V84・Codex #4966445912）: 会議 repeat Gate を full E2E より「前」に実行する。
      # Playwright は各実行の開始時に既定 output dir（test-results）を掃除するため、repeat Gate を後段に置くと
      # full E2E が test-results に書き出した証拠 PNG を消してから upload が走り、success artifact が 0 件になっていた
      #（`if-no-files-found: ignore` のため silent green 化）。repeat Gate を先に走らせ、full E2E を「最後の」
      # Playwright 実行にすることで、証拠 PNG を upload step まで確実に保全する（別 output dir 案の代替＝reorder 案）。
      # なお R3（V83 P2-2・Codex #4965315275）の会議 race 再発防止 Gate（--repeat-each=5 --retries=0）は非弱体化で維持。
      - name: Meeting atomicity flake repeat gate (--repeat-each=5 --retries=0)
        run: pnpm --filter @hokko/web exec playwright test meeting_atomicity_evidence --repeat-each=5 --retries=0

      - name: Run E2E (playwright)
        run: pnpm --filter @hokko/web exec playwright test

      # EMERGENCY Gate-0 R4（成功時の視覚 Evidence・責務=success 専用）: full E2E が最後の Playwright 実行のため
      # test-results の証拠 PNG（3D オフィス desktop/mobile・AI社員 parity 等）は保全されている。
      # if-no-files-found: error にして 0 PNG を stage3 failure にし、artifact 0 の silent green を防ぐ。
      # 対象は seed の DEMO データのみ（実顧客 PII なし）。名前は run ID 付き・短 retention。
      - name: Upload E2E evidence screenshots (success)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots-${{ github.run_id }}
          path: apps/web/test-results/**/*.png
          retention-days: 3
          if-no-files-found: error

      # F2 診断（失敗時の責務分離・doc137/roadmap38）: 失敗時のみ html report + trace zip + screenshot を
      # 別 artifact として保全する（success 証拠 upload とは step を分離）。report は常に生成されるため warn。
      - name: Upload Playwright report and traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            apps/web/playwright-report
            apps/web/test-results
          retention-days: 7
          if-no-files-found: warn

  # EMERGENCY Gate-0 R2（V83 6.4）: 3 job（stage1 / stage2_integration / stage3_e2e）を全て要求する
  # 単一の安定 check。どれかが failure/cancelled/skipped なら release_gate は失敗する。
  # branch protection で要求しやすい固定 check 名（release_gate）にする（必須化は人間の Repository Settings 操作＝人間 Gate）。
  release_gate:
    runs-on: ubuntu-latest
    needs: [stage1, stage2_integration, stage3_e2e]
    if: always()
    steps:
      - name: Require all gates to succeed
        run: |
          echo "stage1=${{ needs.stage1.result }} stage2_integration=${{ needs.stage2_integration.result }} stage3_e2e=${{ needs.stage3_e2e.result }}"
          test "${{ needs.stage1.result }}" = "success" || { echo "::error::stage1 not success"; exit 1; }
          test "${{ needs.stage2_integration.result }}" = "success" || { echo "::error::stage2_integration not success"; exit 1; }
          test "${{ needs.stage3_e2e.result }}" = "success" || { echo "::error::stage3_e2e not success"; exit 1; }
          echo "release_gate: all required jobs success"
