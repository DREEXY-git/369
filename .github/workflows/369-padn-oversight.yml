# 369 PADN L2 — H Oversight（§14）
#
# H-Codex による read-only 監督。1日2回の schedule + repository_dispatch(padn_oversight) +
# 手動起動。H は Task/Lease 発行やコード変更を行わない。出力は監督レポートのみで、
# PADN_REPORTS_ENABLED=true のときのみ Control Root へ append-only 投稿する。
name: 369 PADN L2 Oversight

on:
  schedule:
    - cron: '15 0,12 * * *'
  workflow_dispatch: {}
  repository_dispatch:
    types: [padn_oversight]

permissions: {}

concurrency:
  group: 369-padn-oversight
  cancel-in-progress: false

jobs:
  oversight:
    # github.ref ガード: branch 上の改変版 workflow 定義に secrets を渡さない
    if: >-
      github.repository == 'DREEXY-git/369' &&
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'workflow_dispatch' || vars.PADN_AUTONOMY_ENABLED == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}
    env:
      OPENAI_KEY_SET: ${{ secrets.OPENAI_API_KEY != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Export L1/L2 snapshot + oversight prompt (read-only)
        env:
          PADN_AUTONOMY_ENABLED: ${{ vars.PADN_AUTONOMY_ENABLED }}
          GH_TOKEN: ${{ github.token }}
        run: |
          # snapshot は codex の作業ディレクトリ（checkout 内）に置く。read-only sandbox から
          # runner.temp が読めない可能性があるため、prompt が参照するパスと実体を一致させる。
          node scripts/padn/export-snapshot.mjs \
            --out ./padn-snapshot.json \
            --oversight-prompt "${{ runner.temp }}/padn-oversight-prompt.md"
      # 観測専用は permission-profile ':read-only' のみ（safety-strategy: read-only は
      # legacy sandbox を強制し profile と併用不可 — README 明記。既定 drop-sudo が適用される）。
      - name: Run H-Codex oversight (read-only)
        id: run_codex
        if: env.OPENAI_KEY_SET == 'true'
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: ${{ runner.temp }}/padn-oversight-prompt.md
          permission-profile: ':read-only'
          output-schema-file: config/padn/schemas/oversight-report.schema.json
          output-file: ${{ runner.temp }}/padn-oversight-report.json

  report:
    needs: oversight
    if: >-
      always() && needs.oversight.result == 'success' &&
      vars.PADN_AUTONOMY_ENABLED == 'true' && vars.PADN_REPORTS_ENABLED == 'true' &&
      needs.oversight.outputs.final_message != ''
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      issues: write
    steps:
      - name: Post oversight report to Control Root (append-only)
        uses: actions/github-script@v7
        env:
          OVERSIGHT_REPORT: ${{ needs.oversight.outputs.final_message }}
        with:
          script: |
            // Control Root を discovery（Issue 番号固定前提を置かない）
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner, repo: context.repo.repo, state: 'open', per_page: 100,
            });
            const roots = issues.filter(i => !i.pull_request &&
              i.title.includes('[CONTROL]') && (i.body || '').includes('369-control-root-v1'));
            if (roots.length !== 1) { core.warning(`Control Root が一意でない (${roots.length}) — 投稿しない`); return; }
            const body = [
              '## H_OVERSIGHT_REPORT（read-only 監督）',
              '',
              '```json',
              process.env.OVERSIGHT_REPORT,
              '```',
              '',
              `- run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              '_H は Task/Lease 発行・コード変更・Gate 解除を行いません。この投稿は append-only です。_',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: roots[0].number, body,
            });
