# =============================================================================
# 369 統合AI経営OS — ローカル開発用 Docker Compose
#
# 使い方:
#   1) インフラのみ起動（Web/Worker はローカルで pnpm 起動）:
#        docker compose up -d postgres redis minio mailhog
#   2) すべて起動（Web/Worker もコンテナで）:
#        docker compose --profile full up -d
# =============================================================================
services:
  postgres:
    # pgvector 拡張入りの公式イメージ（将来のネイティブベクトル検索に対応）
    image: pgvector/pgvector:pg16
    container_name: app369-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app369
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U app -d app369']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: app369-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: app369-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: ['server', '/data', '--console-address', ':9001']
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - miniodata:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5

  # 起動時に MinIO バケットを自動作成
  minio-setup:
    image: minio/mc:latest
    container_name: app369-minio-setup
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until (mc alias set local http://minio:9000 minioadmin minioadmin) do echo 'waiting minio'; sleep 2; done;
      mc mb -p local/app369 || true;
      mc anonymous set none local/app369 || true;
      echo 'minio bucket ready';
      "

  mailhog:
    # Mailpit（Mailhog 後継、互換UI）。SMTP:1025 / UI:8025
    image: axllent/mailpit:latest
    container_name: app369-mailhog
    restart: unless-stopped
    ports:
      - '1025:1025'
      - '8025:8025'

  # ---- profile: full（Web/Worker もコンテナで起動したい場合のみ）----
  web:
    profiles: ['full']
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    container_name: app369-web
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://app:app@postgres:5432/app369
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      SESSION_SECRET: dev-only-insecure-session-secret-change-me-0123456789abcdef
    ports:
      - '3000:3000'

  worker:
    profiles: ['full']
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    container_name: app369-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://app:app@postgres:5432/app369
      REDIS_URL: redis://redis:6379

volumes:
  pgdata:
  redisdata:
  miniodata:
