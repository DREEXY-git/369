# CI Stage 1（Phase X-05-1・doc63 §4 Stage 1 準拠）
# DB不要・secrets不要・本番接触なし。既存の package scripts のみを実行する。
# Stage 2（build）・Stage 3（E2E smoke）は別承認（doc63 §6）。
name: CI

on:
  push:
    branches:
      - main
      - claude/**
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  stage1:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Company Brain safety checks
        run: node scripts/check-company-brain-safety.mjs

      - name: Unit tests
        run: pnpm test

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint
